#{extends 'main.html' /}
#{set title:'Cadastro Geral' /}

<div class="page-wrap">
    <h1>Cadastro Geral</h1>

    <div class="form-card">
        <form action="@{Usuarios.salvar()}" method="POST">

            <h2>Usuário</h2>
            <label>Nome</label>
            <input type="text" name="u.nome" />
            <label>E-mail</label>
            <input type="email" name="u.email" />
            <label>Senha</label>
            <input type="password" name="u.senha" />

            <h2>Equipamento</h2>
            <label>Nome</label>
            <input type="text" name="e.nome" />
            <label>Patrimônio</label>
            <input type="text" name="e.patrimonio" />
            <label>Tipo</label>
            <input type="text" name="e.tipo" />
            <label>Laboratório</label>
            <input type="text" name="e.laboratorio" />

            <h2>Chamado</h2>
            <label>Titulo</label>
            <input type="text" name="c.titulo" />
            <label>Descrição</label>
            <input type="text" name="c.descricao" />
            <label>Prioridade</label>
            <input type="text" name="c.prioridade" />
            <label>Status</label>
            <input type="text" name="c.status" />

            <input type="submit" value="Cadastrar" />
        </form>
    </div>
</div>
