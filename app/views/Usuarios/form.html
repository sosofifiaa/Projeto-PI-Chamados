#{extends 'main.html' /}
#{set title:'Cadastro Geral' /}

<style>
    body { font-family: Arial, sans-serif; }
    h1, h2 { color: #333; }
    form { width: 350px; }
    input[type="text"], input[type="email"], input[type="password"] {
        width: 100%;
        padding: 8px;
        margin-bottom: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    input[type="submit"] {
        background-color: #4CAF50;
        color: white;
        padding: 10px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 10px;
    }
    input[type="submit"]:hover { background-color: #45a049; }
</style>

<h1>Cadastro Geral</h1>

<form action="@{Usuarios.salvar()}" method="POST">

    <h2>Usuário</h2>
    <label>Nome</label>
    <input type="text" name="u.nome" />
    <label>E-mail</label>
    <input type="email" name="u.email" />
    <label>Senha</label>
    <input type="password" name="u.senha" />

    <h2>Equipamento</h2>
    <label>Nome</label>
    <input type="text" name="e.nome" />
    <label>Patrimônio</label>
    <input type="text" name="e.patrimonio" />
    <label>Tipo</label>
    <input type="text" name="e.tipo" />
    <label>Laboratório</label>
    <input type="text" name="e.laboratorio" />
	
	<h2>Chamado</h2>
	 <label>Titulo</label>
	 <input type="text" name="c.titulo" />
	 <label>Descrição</label>
	 <input type="text" name="c.descricao" />
	 <label>Prioridade</label>
	 <input type="text" name="c.prioridade" />
	 <label>Status</label>
	 <input type="text" name="c.status" />

    <input type="submit" value="Cadastrar" />
</form>
<br>
